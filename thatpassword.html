<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f2f2f2;
        }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

    <h2>Enter Password</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
    <p class="error" id="errorMessage"></p>
    <img id="loadingbar" src="" width="">
    
    <script>
        function checkPassword() {
            var correctPassword = "princess"; // Change this
            var userPassword = document.getElementById("passwordInput").value;

            if (userPassword === correctPassword) {
                document.getElementById("loadingbar").src="loadingbar2.gif";
                setTimeout(() => {
                    window.location.href = "frog.html"; // Redirect
                }, 13500); // 1000 milliseconds = 1 second
            } else {
                document.getElementById("errorMessage").textContent = "Wrong password!";
            }
        }
    </script>

</body>
</html>
