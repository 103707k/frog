<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tetris</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    canvas {
      border: 2px solid #fff;
      background: #000;
    }

    .panel {
      margin-left: 20px;
    }
  </style>
</head>
<body>

<canvas id="tetris" width="240" height="400"></canvas>

<div class="panel">
  <h2>Tetris</h2>
  <p>Score: <span id="score">0</span></p>
  <p>
    ⬅ ➡ Move<br>
    ⬇ Soft drop<br>
    ⬆ Rotate<br>
    Space: Hard drop
  </p>
</div>

<script>
  const canvas = document.getElementById('tetris');
  const context = canvas.getContext('2d');
  context.scale(20, 20);

  const scoreElement = document.getElementById('score');

  function createMatrix(w, h) {
    const matrix = [];
    while (h--) matrix.push(new Array(w).fill(0));
    return matrix;
  }

  function createPiece(type) {
    if (type === 'T') return [[0,1,0],[1,1,1],[0,0,0]];
    if (type === 'O') return [[2,2],[2,2]];
    if (type === 'L') return [[0,0,3],[3,3,3],[0,0,0]];
    if (type === 'J') return [[4,0,0],[4,4,4],[0,0,0]];
    if (type === 'I') return [[0,0,0,0],[5,5,5,5],[0,0,0,0],[0,0,0,0]];
    if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
    if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
  }

  const colors = [
    null,
    '#FF0D72',
    '#0DC2FF',
    '#0DFF72',
    '#F538FF',
    '#FF8E0D',
    '#FFE138',
    '#3877FF'
  ];

  function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) {
          context.fillStyle = colors[value];
          context.fillRect(x + offset.x, y + offset.y, 1, 1);
        }
      });
    });
  }

  function collide(arena, player) {
    const m = player.matrix;
    const o = player.pos;
    for (let y = 0; y < m.length; ++y) {
      for (let x = 0; x < m[y].length; ++x) {
        if (m[y][x] !== 0 &&
           (arena[y + o.y] &&
            arena[y + o.y][x + o.x]) !== 0) {
          return true;
        }
      }
    }
    return false;
  }

  function merge(arena, player) {
    player.matrix.forEach((row, y) => {
      row.forEach((value, x) => {
        if (value !== 0) {
          arena[y + player.pos.y][x + player.pos.x] = value;
        }
      });
    });
  }

  function rotate(matrix) {
    for (let y = 0; y < matrix.length; ++y) {
      for (let x = 0; x < y; ++x) {
        [matrix[x][y], matrix[y][x]] =
        [matrix[y][x], matrix[x][y]];
      }
    }
    matrix.forEach(row => row.reverse());
  }

  function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
      player.pos.y--;
      merge(arena, player);
      playerReset();
      arenaSweep();
      updateScore();
    }
    dropCounter = 0;
  }

  function hardDrop() {
    while (!collide(arena, player)) {
      player.pos.y++;
    }
    player.pos.y--;
    playerDrop();
  }

  function arenaSweep() {
    outer: for (let y = arena.length - 1; y >= 0; --y) {
      for (let x = 0; x < arena[y].length; ++x) {
        if (arena[y][x] === 0) continue outer;
      }
      const row = arena.splice(y, 1)[0].fill(0);
      arena.unshift(row);
      ++player.score;
      ++y;
    }
  }

  function playerReset() {
    const pieces = 'TJLOSZI';
    player.matrix = createPiece(pieces[Math.random() * pieces.length | 0]);
    player.pos.y = 0;
    player.pos.x =
      (arena[0].length / 2 | 0) -
      (player.matrix[0].length / 2 | 0);

    if (collide(arena, player)) {
      arena.forEach(row => row.fill(0));
      player.score = 0;
      updateScore();
    }
  }

  function updateScore() {
    scoreElement.innerText = player.score;
  }

  function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
  }

  let dropCounter = 0;
  let dropInterval = 1000;
  let lastTime = 0;

  function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > dropInterval) playerDrop();
    draw();
    requestAnimationFrame(update);
  }

  document.addEventListener('keydown', event => {
    if (event.key === 'ArrowLeft') player.pos.x--;
    if (event.key === 'ArrowRight') player.pos.x++;
    if (event.key === 'ArrowDown') playerDrop();
    if (event.key === 'ArrowUp') rotate(player.matrix);
    if (event.key === ' ') hardDrop();

    if (collide(arena, player)) {
      if (event.key === 'ArrowLeft') player.pos.x++;
      if (event.key === 'ArrowRight') player.pos.x--;
    }
  });

  const arena = createMatrix(12, 20);

  const player = {
    pos: {x: 0, y: 0},
    matrix: null,
    score: 0
  };

  playerReset();
  updateScore();
  update();
</script>

</body>
</html>
